<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 손으로 완성하는 최적의 스펙</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* =========================================
           Design System & Variables
           ========================================= */
        :root {
            /* Default Dark Mode */
            --bg-color: #0b0c10;
            --surface-color: #1f2833;
            --surface-hover: #2a3644;
            --text-main: #ffffff;
            --text-sub: #c5c6c7;
            --neon-point: #66fcf1;
            --neon-shadow: rgba(102, 252, 241, 0.3);
            --border-color: rgba(255, 255, 255, 0.05);
            --timeline-line: rgba(197, 198, 199, 0.2);
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg-color: #ffffff;
            --surface-color: #f4f5f7;
            --surface-hover: #e5e7eb;
            --text-main: #111827;
            --text-sub: #4b5563;
            --neon-point: #0d9488; /* 라이트 모드용 짙은 청록색 포인트 */
            --neon-shadow: rgba(13, 148, 136, 0.2);
            --border-color: rgba(0, 0, 0, 0.05);
            --timeline-line: rgba(75, 85, 99, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        /* 부드러운 테마 전환을 위한 트랜지션 추가 */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* =========================================
           Theme Toggle Button
           ========================================= */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 1000;
            background: var(--surface-color);
            border: 2px solid var(--neon-point);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-shadow
